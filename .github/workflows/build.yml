name: Build
on:
  push:
    branches:
      - main
# Node.js 20 is deprecated in GitHub Actions as of June 2026. Opt into Node.js 24 now.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          push: false
