services:
  pmtiles-updater:
    image: ghcr.io/traxeon/pmtiles-updater:latest
    restart: unless-stopped
    environment:
      # Leave unset to use yesterday's Protomaps planet build (default).
      # Set only if downloading from a custom or static URL.
      # - PMTILES_SOURCE_URL=https://example.com/your.pmtiles
      - PMTILES_DATA_PATH=/data
      - PMTILES_FILENAME=world.pmtiles
      # Cron schedule: minute hour day month weekday
      # Default: every Monday at 3am (0 3 * * 1)
      - CRON_SCHEDULE=0 3 * * 1
      - TZ=UTC
      - ARIA2C_CONNECTIONS=8
      - ARIA2C_MAX_TRIES=3
      - ARIA2C_RETRY_WAIT=60
      - ARIA2C_LOG_LEVEL=notice
    volumes:
      # Any service that reads the PMTiles file must mount this same volume
      # and reference the file at PMTILES_DATA_PATH/PMTILES_FILENAME (default: /data/world.pmtiles)
      - pmtiles_data:/data

volumes:
  pmtiles_data:
